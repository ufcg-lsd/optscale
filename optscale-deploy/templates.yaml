# Source: optscale/templates/thanos_compactor.yaml
apiVersion: batch/v1
kind: CronJob
metadata:
  name: thanos-compactor
  labels:
    app: thanos-compactor
    release: optscale
spec:
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  schedule: "0 */12 * * *"
  startingDeadlineSeconds: 100
  suspend: false
  jobTemplate:
    metadata:
      labels:
        app: thanos-compactor
        release: optscale
    spec:
      backoffLimit: 0
      template:
        metadata:
          labels:
            app: thanos-compactor
            release: optscale
        spec:
          initContainers:
          - name: "wait-minio"
            image: "busybox:1.30.0"
            imagePullPolicy: IfNotPresent
            command: ['sh', '-c', 'until nc -z minio.default.svc.cluster.local 80 -w 2; do sleep 2; done']
          containers:
          - name: compact
            image: "thanosio/thanos:v0.39.1"
            imagePullPolicy: IfNotPresent
            command:
              - thanos
            args:
              - compact
              - --log.level=info
              - --http-address=0.0.0.0:10902
              - --consistency-delay=4h
              - --objstore.config-file=/var/thanos/config/thanos_conf.yaml
              - --data-dir=/var/thanos/data
              - --delete-delay=6h
              - --retention.resolution-raw=30d
              - --retention.resolution-5m=90d
              - --retention.resolution-1h=120d
              - --compact.enable-vertical-compaction
            ports:
              - containerPort: 10902
                name: http
                protocol: TCP
            livenessProbe:
              httpGet:
                path: /-/healthy
                port: http
              initialDelaySeconds: 30
              timeoutSeconds: 30
              periodSeconds: 10
              successThreshold: 1
              failureThreshold: 6
            readinessProbe:
              httpGet:
                path: /-/ready
                port: http
              initialDelaySeconds: 30
              timeoutSeconds: 30
              periodSeconds: 10
              successThreshold: 1
              failureThreshold: 6
            volumeMounts:
              - name: data
                mountPath: /var/thanos/data
              - name: config
                mountPath: /var/thanos/config
                readOnly: true
          volumes:
            - name: config
              secret:
                secretName: thanos-secret
                items:
                  - key: thanos_conf.yaml
                    path: thanos_conf.yaml
            - name: data
              persistentVolumeClaim:
                claimName: thanos-compactor-claim
          restartPolicy: Never
---
