# Source: optscale/templates/auth.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  labels:
    app: auth
    chart: optscale-0.1.0
    release: optscale
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
      release: optscale
  template:
    metadata:
      labels:
        app: auth
        release: optscale
    spec:
      initContainers:
      - name: "wait-etcd-client"
        image: "busybox:1.30.0"
        imagePullPolicy: IfNotPresent
        command: ['sh', '-c', 'until nc -z etcd-client.default.svc.cluster.local 2379 -w 2; do sleep 2; done']
      - name: wait-mariadb
        image: "mariadb:local"
        imagePullPolicy: Never
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mariadb-secret
              key: password
        command: ['sh', '-c', 'until mysql --connect-timeout=2 -h mariadb.default.svc.cluster.local -p$MYSQL_ROOT_PASSWORD -e "SELECT 1"; do sleep 2; done']
      containers:
      - name: auth
        image: "auth:local"
        imagePullPolicy: Never
        ports:
        - containerPort: 8905
        env:
        - name: IMAGE_ID
          value: 
        - name: HX_ETCD_HOST
          value: etcd-client
        - name: HX_ETCD_PORT
          value: "2379"
        - name: GOOGLE_OAUTH_CLIENT_ID
          value: ""
        - name: GOOGLE_OAUTH_CLIENT_SECRET
          value: ""
        - name: MICROSOFT_OAUTH_CLIENT_ID
          value: ""
        readinessProbe:
          tcpSocket:
            port: 8905
          initialDelaySeconds: 5
          periodSeconds: 10
