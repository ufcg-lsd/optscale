      - name: copy-config
        image: "busybox:1.30.0"
        imagePullPolicy: "IfNotPresent"
        command:
          - "sh"
        args:
          - "-c"
          - |
            set -e
            set -x
            cp /configdb-readonly/mongod.conf /data/configdb/mongod.conf
            cp /keydir-readonly/key.txt /data/configdb/key.txt
            chmod 600 /data/configdb/key.txt
        volumeMounts:
        - name: config
          mountPath: /configdb-readonly
        - name: configdir
          mountPath: /data/configdb
        - name: keydir
          mountPath: /keydir-readonly
      - name: bootstrap
        image: "mongo:local"
        command:
          - peer-finder
        args:
          - -on-start=/on-start.sh
          - "-service=mongo-discovery"
        imagePullPolicy: Never
        env:
        - name: IMAGE_ID
          value: 
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.namespace
        - name: REPLICA_SET
          value: "mongo"
        - name: TIMEOUT
          value: "900"
        - name: SKIP_INIT
          value: "false"
        - name: TLS_MODE
          value: "requireSSL"
        - name: AUTH
          value: "true"
        - name: ADMIN_USER
          valueFrom:
            secretKeyRef:
              name: "mongo-secret"
              key: username
        - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: "mongo-secret"
              key: password
        volumeMounts:
        - name: configdir
          mountPath: /data/configdb
        - name: datadir
          mountPath: /data/db
        - name: workdir
          mountPath: /work-dir
      containers:
      - name: mongo
        image: "mongo:local"
        imagePullPolicy: "Never"
        ports:
        - name: mongodb
          containerPort: 27017
        command:
          - mongod
        args:
          - --config=/data/configdb/mongod.conf
          - --dbpath=/data/db
          - --replSet=mongo
          - --port=27017
          - --bind_ip=0.0.0.0
          - --auth
          - --keyFile=/data/configdb/key.txt
          - --storageEngine=wiredTiger
          - --wiredTigerCacheSizeGB=1
        livenessProbe:
          exec:
            command:
              - mongo
              - --eval
              - "db.adminCommand('ping')"
          initialDelaySeconds: 5
          timeoutSeconds: 1
          failureThreshold: 3
          periodSeconds: 10
          successThreshold: 1
        readinessProbe:
          exec:
            command:
              - mongo
              - --eval
              - "db.adminCommand('ping')"
          initialDelaySeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
          periodSeconds: 10
          successThreshold: 1
        volumeMounts:
        - name: datadir
          mountPath: /data/db
        - name: configdir
          mountPath: /data/configdb
      volumes:
      - name: config
        configMap:
          name: mongo-config
      - name: keydir
        secret:
          defaultMode: 0400
          secretName: mongo-secret
      - name: configdir
        emptyDir: {}
      - name: workdir
        emptyDir: {}
      - name: datadir
        hostPath:
          path: /optscale/mongo
          type: DirectoryOrCreate
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
