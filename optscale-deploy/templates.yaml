apiVersion: apps/v1
kind: Deployment
metadata:
  name: thanos-query
  labels:
    app: thanos-query
    chart: optscale-0.1.0
    release: optscale
spec:
  replicas: 1
  selector:
    matchLabels:
      app: thanos-query
      release: optscale
  template:
    metadata:
      labels:
        app: thanos-query
        release: optscale
    spec:
      initContainers:
      - name: "wait-thanos-receive"
        image: "busybox:1.30.0"
        imagePullPolicy: IfNotPresent
        command: ['sh', '-c', 'until nc -z thanos-receive.default.svc.cluster.local 10902 -w 2; do sleep 2; done']
      - name: "wait-thanos-storegateway"
        image: "busybox:1.30.0"
        imagePullPolicy: IfNotPresent
        command: ['sh', '-c', 'until nc -z thanos-storegateway.default.svc.cluster.local 10902 -w 2; do sleep 2; done']
      containers:
        - name: query
          image: "thanosio/thanos:v0.39.1"
          imagePullPolicy: "IfNotPresent"
          command:
            - thanos
          args:
            - query
            - --grpc-address=0.0.0.0:10901
            - --http-address=0.0.0.0:10902
            - --endpoint=dnssrv+_grpc._tcp.thanos-storegateway.default.svc.cluster.local
            - --endpoint=dnssrv+_grpc._tcp.thanos-receive.default.svc.cluster.local
          ports:
            - name: http
              containerPort: 10902
              protocol: TCP
            - name: grpc
              containerPort: 10901
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 30
            timeoutSeconds: 30
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 30
            timeoutSeconds: 30
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 6
